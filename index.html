<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="鼻歌スタジオ">
<meta name="theme-color" content="#12101c">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>鼻歌スタジオ</title>
<style>
  :root{
    --bg:#12101c; --bg2:#1b1830; --card:#221f38;
    --ink:#f3f0ff; --muted:#a79fd0; --line:#332e52;
    --accent:#c9a3ff; --accent2:#7ee0d3; --warm:#ffd6a0;
    --danger:#ff8a9c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:radial-gradient(120% 80% at 50% -10%, #241f45 0%, var(--bg) 55%);
    color:var(--ink); min-height:100vh; overscroll-behavior:none;
  }
  .wrap{max-width:520px; margin:0 auto;
    padding:calc(env(safe-area-inset-top,0px) + 22px) 18px calc(env(safe-area-inset-bottom,0px) + 60px);}
  header{text-align:center; margin:6px 0 20px}
  header h1{font-size:26px; margin:0; letter-spacing:.06em; font-weight:700}
  header p{color:var(--muted); font-size:13px; margin:6px 0 0}

  .card{
    background:linear-gradient(180deg, var(--card), #1e1b34);
    border:1px solid var(--line); border-radius:20px;
    padding:20px; margin:16px 0; box-shadow:0 10px 30px rgba(0,0,0,.25);
  }

  .rec-wrap{display:flex; flex-direction:column; align-items:center; gap:14px}
  .rec-btn{
    width:120px; height:120px; border-radius:50%; border:none;
    background:radial-gradient(circle at 50% 40%, #ff8fa3, #e0506f);
    color:#fff; font-size:16px; font-weight:700; letter-spacing:.05em;
    box-shadow:0 8px 26px rgba(224,80,111,.45); cursor:pointer;
    transition:transform .12s ease, box-shadow .2s ease; position:relative;
  }
  .rec-btn:active{transform:scale(.95)}
  .rec-btn.recording{
    background:radial-gradient(circle at 50% 40%, #9be7ff, #4fb8e0);
    box-shadow:0 0 0 0 rgba(79,184,224,.5); animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(79,184,224,.55)}
    70%{box-shadow:0 0 0 22px rgba(79,184,224,0)}
    100%{box-shadow:0 0 0 0 rgba(79,184,224,0)}
  }
  .hint{color:var(--muted); font-size:13px; text-align:center; line-height:1.7}
  .level{width:200px; height:6px; background:var(--line); border-radius:3px; overflow:hidden}
  .level > div{height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width .05s}
  .timer{font-variant-numeric:tabular-nums; font-size:15px; color:var(--muted)}

  .analysis{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; text-align:center}
  .stat{background:#1a1730; border:1px solid var(--line); border-radius:14px; padding:12px 8px}
  .stat .k{font-size:11px; color:var(--muted); letter-spacing:.08em}
  .stat .v{font-size:20px; font-weight:700; margin-top:4px; color:var(--accent)}

  .section-title{font-size:13px; color:var(--muted); letter-spacing:.1em; margin:0 0 12px; font-weight:600}
  .band{font-size:12px; color:var(--accent2); text-align:center; margin:0 0 4px; letter-spacing:.06em}
  .styles{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .style-btn{
    padding:14px 10px; border-radius:14px; border:1px solid var(--line);
    background:#1a1730; color:var(--ink); font-size:15px; font-weight:600; cursor:pointer;
    display:flex; align-items:center; gap:10px; justify-content:center; transition:all .15s;
  }
  .style-btn .emoji{font-size:20px}
  .style-btn.active{border-color:var(--accent); background:linear-gradient(180deg,#332a5c,#282148); box-shadow:0 4px 16px rgba(201,163,255,.25)}

  .slider-row{margin:18px 0}
  .slider-label{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); margin-bottom:8px}
  .slider-label b{color:var(--ink); font-weight:600}
  input[type=range]{
    -webkit-appearance:none; width:100%; height:8px; border-radius:5px;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:26px; height:26px; border-radius:50%;
    background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.4); cursor:pointer; border:3px solid var(--accent);
  }
  .bright-track input[type=range]{background:linear-gradient(90deg,#5b6bb0,#ffd76a)}

  .toggles{display:flex; gap:10px; margin:6px 0 4px}
  .toggle{
    flex:1; padding:11px 8px; border-radius:12px; border:1px solid var(--line);
    background:#1a1730; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer;
    transition:all .15s; letter-spacing:.02em;
  }
  .toggle.on{border-color:var(--accent2); color:var(--accent2); background:#16241f}

  .transport{display:flex; gap:12px; margin-top:16px}
  .btn{
    flex:1; padding:16px; border-radius:16px; border:none; font-size:16px; font-weight:700;
    cursor:pointer; transition:transform .1s, opacity .2s; letter-spacing:.04em;
  }
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.4}
  .btn-play{background:linear-gradient(135deg,#7ee0d3,#5ec4e0); color:#0d2a2f}
  .btn-stop{background:#2a2646; color:var(--ink); border:1px solid var(--line)}
  .btn-save{width:100%; margin-top:12px; background:linear-gradient(135deg,#c9a3ff,#9a7ae0); color:#180f2e}

  .toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(80px);
    background:#2a2646; color:var(--ink); padding:12px 22px; border-radius:30px;
    border:1px solid var(--line); font-size:14px; opacity:0; transition:all .3s; z-index:50; max-width:90%;
  }
  .toast.show{transform:translateX(-50%) translateY(0); opacity:1}
  footer{text-align:center; color:var(--muted); font-size:11px; margin-top:30px; opacity:.7; line-height:1.8}
  .beat-dots{display:flex; gap:6px; justify-content:center; margin-top:14px; height:10px}
  .beat-dots span{width:8px; height:8px; border-radius:50%; background:var(--line); transition:all .1s}
  .beat-dots span.on{background:var(--accent2); transform:scale(1.4)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎙 鼻歌スタジオ</h1>
    <p>ふんふん歌えば、バンドがつく</p>
  </header>

  <!-- 録音 -->
  <div class="card">
    <div class="rec-wrap">
      <button id="recBtn" class="rec-btn">録音<br>START</button>
      <div class="level"><div id="levelBar"></div></div>
      <div class="timer" id="timer">00:00</div>
      <div class="hint" id="recHint">ボタンを押して、鼻歌を歌ってください<br>（5〜15秒・はっきりめの声で）</div>
    </div>
  </div>

  <!-- 解析結果 -->
  <div class="card" id="resultCard" style="display:none">
    <div class="analysis">
      <div class="stat"><div class="k">キー</div><div class="v" id="statKey">—</div></div>
      <div class="stat"><div class="k">テンポ</div><div class="v" id="statTempo">—</div></div>
      <div class="stat"><div class="k">音の数</div><div class="v" id="statNotes">—</div></div>
    </div>
    <div class="beat-dots" id="beatDots"><span></span><span></span><span></span><span></span></div>
  </div>

  <!-- 調整パネル -->
  <div class="card" id="controlCard" style="display:none">
    <p class="band">🎹 ピアノ ・ 🎸 ベース ・ 🥁 ドラム ＋ あなたの旋律</p>
    <p class="section-title">曲調スタイル</p>
    <div class="styles" id="styles">
      <button class="style-btn active" data-style="jpop"><span class="emoji">🌸</span>J-POP</button>
      <button class="style-btn" data-style="jazz"><span class="emoji">🎷</span>ジャズ</button>
      <button class="style-btn" data-style="classical"><span class="emoji">🎻</span>クラシック</button>
      <button class="style-btn" data-style="bossa"><span class="emoji">🌴</span>ボサノバ</button>
    </div>

    <div class="slider-row" style="margin-top:22px">
      <div class="slider-label"><span>テンポ</span><b id="tempoVal">100 BPM</b></div>
      <input type="range" id="tempoSlider" min="60" max="180" value="100" step="1">
    </div>

    <div class="slider-row bright-track">
      <div class="slider-label"><span>🌙 暗い</span><b id="brightVal">ふつう</b><span>明るい ☀️</span></div>
      <input type="range" id="brightSlider" min="0" max="100" value="50" step="1">
    </div>

    <p class="section-title" style="margin-top:20px">旋律の仕上げ</p>
    <div class="toggles">
      <button class="toggle on" id="tuneBtn">🎯 音程を整える</button>
      <button class="toggle on" id="rhythmBtn">⏱ リズムを整える</button>
    </div>

    <div class="transport">
      <button class="btn btn-play" id="playBtn">▶ 再生</button>
      <button class="btn btn-stop" id="stopBtn" disabled>■ 停止</button>
    </div>
    <button class="btn btn-save" id="saveBtn">⬇ WAVで保存</button>
  </div>

  <footer>
    マイクの音声はこの端末の中だけで処理され、どこにも送信されません。<br>
    Safariで「ホーム画面に追加」すればアプリのように使えます。
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   鼻歌スタジオ v2  —  Humming → Band (Piano + Bass + Drums + Lead)
   すべて端末内(Web Audio API)で処理。外部通信なし。
   ========================================================= */

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const MAJOR_SCALE = [0,2,4,5,7,9,11];
const MINOR_SCALE = [0,2,3,5,7,8,10];

const state = {
  rawMelody: [],   // 解析直後 {midi,start,dur}
  melody: [],      // 補正後（再生用）
  key: 0, isMinor: false,
  tempo: 100, baseTempo: 100,
  brightness: 0.5, style: 'jpop',
  autoTune: true, autoRhythm: true,
};

let audioCtx = null, mediaStream = null, recNode = null;
let recording = false, recordedChunks = [], recStartTime = 0, timerInterval = null;
let playHandles = [], playing = false, beatTimer = null;

const $ = id => document.getElementById(id);
const recBtn=$('recBtn'), levelBar=$('levelBar'), timerEl=$('timer'), recHint=$('recHint');
const resultCard=$('resultCard'), controlCard=$('controlCard'), toastEl=$('toast');

function toast(msg){
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toastEl._t); toastEl._t = setTimeout(()=>toastEl.classList.remove('show'), 2600);
}

/* =========================================================
   1. 録音
   ========================================================= */
recBtn.addEventListener('click', async ()=>{ recording ? stopRecording() : await startRecording(); });

async function startRecording(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') await audioCtx.resume();
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
  }catch(e){ toast('マイクを使えませんでした。設定で許可してください'); return; }

  recordedChunks = [];
  const source = audioCtx.createMediaStreamSource(mediaStream);
  recNode = audioCtx.createScriptProcessor(4096, 1, 1);
  recNode.onaudioprocess = (e)=>{
    const input = e.inputBuffer.getChannelData(0);
    recordedChunks.push(new Float32Array(input));
    let sum=0; for(let i=0;i<input.length;i++) sum += input[i]*input[i];
    levelBar.style.width = Math.min(100, Math.sqrt(sum/input.length)*400) + '%';
  };
  source.connect(recNode);
  const silent = audioCtx.createGain(); silent.gain.value = 0;
  recNode.connect(silent); silent.connect(audioCtx.destination);
  recNode._source = source;

  recording = true; recStartTime = performance.now();
  recBtn.classList.add('recording'); recBtn.innerHTML = '録音中<br>STOP';
  recHint.textContent = 'もう一度押すと解析します';
  timerInterval = setInterval(updateTimer, 200);
}
function updateTimer(){
  const s = Math.floor((performance.now()-recStartTime)/1000);
  timerEl.textContent = String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  if(s >= 30) stopRecording();
}
function stopRecording(){
  if(!recording) return;
  recording = false; clearInterval(timerInterval);
  recBtn.classList.remove('recording'); recBtn.innerHTML = '録音<br>START';
  levelBar.style.width = '0%';
  try{ if(recNode._source) recNode._source.disconnect(); recNode.disconnect(); }catch(e){}
  if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop());

  let total=0; recordedChunks.forEach(c=>total+=c.length);
  if(total < audioCtx.sampleRate*0.8){ toast('短すぎました。もう少し歌ってみてください'); return; }
  const buf = new Float32Array(total);
  let off=0; recordedChunks.forEach(c=>{buf.set(c,off); off+=c.length;});
  recHint.textContent = '解析しています…';
  setTimeout(()=>analyze(buf, audioCtx.sampleRate), 30);
}

/* =========================================================
   2. ピッチ解析（自己相関 + 八度誤り対策） → 音符列
   ========================================================= */
function detectPitch(buf, sr){
  let rms=0; for(let i=0;i<buf.length;i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms/buf.length);
  if(rms < 0.008) return -1;

  const minLag = Math.floor(sr/900), maxLag = Math.floor(sr/70);
  const c = new Float32Array(maxLag+2);
  let c0=0; for(let i=0;i<buf.length;i++) c0 += buf[i]*buf[i];
  for(let lag=minLag; lag<=maxLag; lag++){
    let s=0; for(let i=0;i+lag<buf.length;i++) s += buf[i]*buf[i+lag];
    c[lag]=s;
  }
  // 最初の谷を越えてから最大ピークを取る（基音を拾い、八度上の誤検出を減らす）
  let lag=minLag;
  while(lag<maxLag && c[lag]>c[lag+1]) lag++;
  let maxval=-1, maxpos=-1;
  for(let i=lag;i<=maxLag;i++){ if(c[i]>maxval){ maxval=c[i]; maxpos=i; } }
  if(maxpos<=0 || maxval < c0*0.45) return -1; // 明瞭度ゲート

  // 放物線補間
  const x1=c[maxpos-1]||0, x2=c[maxpos], x3=c[maxpos+1]||0;
  const denom = (x1 + x3 - 2*x2);
  let pos = maxpos; if(denom!==0) pos = maxpos - 0.5*(x3-x1)/denom;
  return sr/pos;
}
function freqToMidi(f){ return Math.round(69 + 12*Math.log2(f/440)); }

function analyze(buf, sr){
  const frame=2048, hop=1024;
  const raw=[];
  for(let start=0; start+frame<=buf.length; start+=hop){
    const seg = buf.subarray(start, start+frame);
    const f = detectPitch(seg, sr);
    raw.push({ t:start/sr, midi: f>0 ? freqToMidi(f) : -1 });
  }
  // メディアン平滑化（5点）
  const med = raw.map((p,i)=>{
    if(p.midi<0) return -1;
    const win=[]; for(let k=-2;k<=2;k++){ const m=raw[i+k]?.midi; if(m>0) win.push(m); }
    win.sort((a,b)=>a-b); return win.length? win[Math.floor(win.length/2)] : p.midi;
  });
  // 連続同音をまとめる
  const notes=[]; let cur=null;
  for(let i=0;i<med.length;i++){
    const m=med[i], t=raw[i].t;
    if(m>0){
      if(cur && cur.midi===m){ cur.end = t+hop/sr; }
      else { if(cur) notes.push(cur); cur={midi:m, start:t, end:t+hop/sr}; }
    } else if(cur){ notes.push(cur); cur=null; }
  }
  if(cur) notes.push(cur);

  // 短い音を除去 → 近接同音を結合
  let clean = notes.filter(n=> (n.end-n.start) >= 0.10);
  const merged=[];
  for(const n of clean){
    const last=merged[merged.length-1];
    if(last && last.midi===n.midi && (n.start-last.end)<0.14) last.end=n.end;
    else merged.push({...n});
  }
  clean = merged;
  // 孤立した八度跳躍を補正
  for(let i=1;i<clean.length-1;i++){
    const a=clean[i-1].midi, b=clean[i].midi, c2=clean[i+1].midi;
    if(Math.abs(b-a)===12 && Math.abs(b-c2)===12 && a===c2) clean[i].midi = a;
  }

  if(clean.length < 3){
    recHint.textContent='ボタンを押して、鼻歌を歌ってください';
    toast('うまく聞き取れませんでした。もう少しはっきり歌ってみてください'); return;
  }

  const t0 = clean[0].start;
  state.rawMelody = clean.map(n=>({ midi:n.midi, start:n.start-t0, dur:n.end-n.start }));

  // テンポ推定（音符長の中央値を1拍とみなす）
  const durs = state.rawMelody.map(n=>n.dur).sort((a,b)=>a-b);
  let bpm = 60/durs[Math.floor(durs.length/2)];
  while(bpm<70) bpm*=2; while(bpm>170) bpm/=2; bpm=Math.round(bpm);

  const {tonic, minor} = detectKey(state.rawMelody);
  state.key=tonic; state.isMinor=minor; state.baseTempo=bpm; state.tempo=bpm;

  processMelody();

  $('statKey').textContent = NOTE_NAMES[tonic] + (minor?'m':'');
  $('statTempo').textContent = bpm;
  $('statNotes').textContent = state.melody.length;
  $('tempoSlider').value = bpm; $('tempoVal').textContent = bpm+' BPM';
  resultCard.style.display='block'; controlCard.style.display='block';
  recHint.textContent='できました！スタイルを選んで▶再生してみてください';
  toast('解析完了！バンドをつけました 🎶');
}

function detectKey(melody){
  const hist=new Array(12).fill(0);
  melody.forEach(n=> hist[((n.midi%12)+12)%12] += n.dur);
  const major=[6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
  const minor=[6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
  let best={score:-1e9,tonic:0,minor:false};
  for(let t=0;t<12;t++){
    let sM=0,sm=0;
    for(let i=0;i<12;i++){ sM+=hist[i]*major[(i-t+12)%12]; sm+=hist[i]*minor[(i-t+12)%12]; }
    if(sM>best.score) best={score:sM,tonic:t,minor:false};
    if(sm>best.score) best={score:sm,tonic:t,minor:true};
  }
  return {tonic:best.tonic, minor:best.minor};
}

/* 音程を音階へスナップ */
function snapToScale(midi, key, isMinor){
  const scale = isMinor?MINOR_SCALE:MAJOR_SCALE;
  const pcSet = scale.map(s=>(key+s)%12);
  let best=midi, bd=99;
  for(let d=-2; d<=2; d++){
    const pc=(((midi+d)%12)+12)%12;
    if(pcSet.includes(pc) && Math.abs(d)<bd){ bd=Math.abs(d); best=midi+d; }
  }
  return best;
}

/* 生メロディ → 補正済みメロディ（音域正規化・音程補正・リズム補正） */
function processMelody(){
  if(!state.rawMelody.length){ state.melody=[]; return; }
  let notes = state.rawMelody.map(n=>({...n}));

  // 音域正規化：中央値がC5(72)付近に来るよう八度シフト（伴奏より上で主役に）
  const ms = notes.map(n=>n.midi).sort((a,b)=>a-b);
  let medMidi = ms[Math.floor(ms.length/2)], shift=0;
  while(medMidi+shift < 69) shift+=12;
  while(medMidi+shift > 81) shift-=12;
  notes.forEach(n=> n.midi += shift);

  if(state.autoTune) notes.forEach(n=> n.midi = snapToScale(n.midi, state.key, state.isMinor));

  if(state.autoRhythm){
    const grid = (60/state.tempo)/2; // 8分音符
    notes.forEach(n=>{
      n.start = Math.round(n.start/grid)*grid;
      n.dur   = Math.max(grid, Math.round(n.dur/grid)*grid);
    });
    notes.sort((a,b)=>a.start-b.start);
    for(let i=0;i<notes.length-1;i++){
      if(notes[i+1].start <= notes[i].start) notes[i+1].start = notes[i].start + grid;
      if(notes[i].start+notes[i].dur > notes[i+1].start)
        notes[i].dur = Math.max(grid, notes[i+1].start - notes[i].start);
    }
  }
  state.melody = notes;
  if($('statNotes')) $('statNotes').textContent = state.melody.length;
}

/* =========================================================
   3. コード進行（キー＋スタイル＋明るさ）
   ========================================================= */
const PROGRESSIONS = {
  jpop:      [0,4,5,3],   // I  V  vi IV
  jazz:      [1,4,0,0],   // ii V  I  I
  classical: [0,3,4,0],   // I  IV V  I
  bossa:     [1,4,0,3],   // ii V  I  IV
};
function scaleDegMidi(deg, key, scale){
  const oct = Math.floor(deg/7);
  return 48 + ((key + scale[((deg%7)+7)%7]) % 12) + oct*12;
}
function buildChords(){
  const scale = state.isMinor?MINOR_SCALE:MAJOR_SCALE;
  const prog = PROGRESSIONS[state.style];
  const b = state.brightness;
  const secPerBeat = 60/state.tempo, barSec = secPerBeat*4;
  const melodyEnd = state.melody.reduce((m,n)=>Math.max(m,n.start+n.dur),0);
  const bars = Math.max(2, Math.ceil(melodyEnd/barSec)+1);
  const jazzy = (state.style==='jazz'||state.style==='bossa');

  const chords=[];
  for(let bar=0; bar<bars; bar++){
    const deg = prog[bar % prog.length];
    const root  = scaleDegMidi(deg,   state.key, scale);
    const third = scaleDegMidi(deg+2, state.key, scale);
    const fifth = scaleDegMidi(deg+4, state.key, scale);
    let tones=[root, third, fifth];
    if(jazzy || b>0.66) tones.push(scaleDegMidi(deg+6, state.key, scale)); // 7th
    if(b>0.82) tones.push(root+14); // 9th
    chords.push({ bar, start:bar*barSec, dur:barSec, root, third, fifth, tones });
  }
  return {chords, bars, secPerBeat, barSec};
}

/* =========================================================
   4. 音源（旋律リード・ピアノ・ベース・ドラム）
   ========================================================= */
function getNoise(ctx){
  if(ctx._noise) return ctx._noise;
  const len=Math.floor(ctx.sampleRate*1);
  const b=ctx.createBuffer(1,len,ctx.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  ctx._noise=b; return b;
}
function mtf(m){ return 440*Math.pow(2,(m-69)/12); }

// 主役の旋律：伸びやかで明瞭、軽いビブラート
function playLead(ctx,dest,midi,when,dur,b){
  const f=mtf(midi);
  const o1=ctx.createOscillator(); o1.type='triangle'; o1.frequency.value=f;
  const o2=ctx.createOscillator(); o2.type='sine'; o2.frequency.value=f; o2.detune.value=5;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2400+b*3500; lp.Q.value=0.6;
  const g=ctx.createGain(); const peak=0.5;
  g.gain.setValueAtTime(0,when);
  g.gain.linearRampToValueAtTime(peak,when+0.02);
  g.gain.setValueAtTime(peak,when+Math.max(0.04,dur*0.7));
  g.gain.exponentialRampToValueAtTime(0.0006,when+dur+0.14);
  const vib=ctx.createOscillator(); vib.type='sine'; vib.frequency.value=5.2;
  const vibg=ctx.createGain();
  vibg.gain.setValueAtTime(0,when); vibg.gain.linearRampToValueAtTime(6,when+0.2);
  vib.connect(vibg); vibg.connect(o1.detune); vibg.connect(o2.detune);
  o1.connect(lp); o2.connect(lp); lp.connect(g); g.connect(dest);
  const end=when+dur+0.25;
  o1.start(when); o2.start(when); vib.start(when);
  o1.stop(end); o2.stop(end); vib.stop(end);
}
// ピアノ（コンピング用）
function playPiano(ctx,dest,midi,when,dur,b,gain){
  const f=mtf(midi);
  const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f;
  const o2=ctx.createOscillator(); o2.type='sine'; o2.frequency.value=f*2;
  const o2g=ctx.createGain(); o2g.gain.value=0.22+b*0.28;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1300+b*2600;
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,when); g.gain.linearRampToValueAtTime(gain,when+0.005);
  g.gain.exponentialRampToValueAtTime(0.0004,when+dur+0.28);
  o.connect(lp); o2.connect(o2g).connect(lp); lp.connect(g).connect(dest);
  const end=when+dur+0.3; o.start(when); o2.start(when); o.stop(end); o2.stop(end);
}
// ベース
function playBass(ctx,dest,midi,when,dur,gain){
  const f=mtf(midi);
  const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=420; lp.Q.value=0.7;
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,when); g.gain.linearRampToValueAtTime(gain,when+0.01);
  g.gain.exponentialRampToValueAtTime(0.0004,when+dur+0.1);
  o.connect(lp).connect(g).connect(dest);
  o.start(when); o.stop(when+dur+0.15);
}
// ドラム
function kick(ctx,dest,when,gain){
  const o=ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(150,when); o.frequency.exponentialRampToValueAtTime(48,when+0.11);
  const g=ctx.createGain();
  g.gain.setValueAtTime(gain,when); g.gain.exponentialRampToValueAtTime(0.0001,when+0.26);
  o.connect(g).connect(dest); o.start(when); o.stop(when+0.3);
}
function snare(ctx,dest,when,gain){
  const n=ctx.createBufferSource(); n.buffer=getNoise(ctx);
  const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=0.7;
  const ng=ctx.createGain();
  ng.gain.setValueAtTime(gain,when); ng.gain.exponentialRampToValueAtTime(0.0001,when+0.16);
  n.connect(bp).connect(ng).connect(dest); n.start(when); n.stop(when+0.2);
  const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=185;
  const og=ctx.createGain();
  og.gain.setValueAtTime(gain*0.5,when); og.gain.exponentialRampToValueAtTime(0.0001,when+0.11);
  o.connect(og).connect(dest); o.start(when); o.stop(when+0.14);
}
function hat(ctx,dest,when,gain,open){
  const n=ctx.createBufferSource(); n.buffer=getNoise(ctx);
  const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7000;
  const g=ctx.createGain(); const dec=open?0.18:0.045;
  g.gain.setValueAtTime(gain,when); g.gain.exponentialRampToValueAtTime(0.0001,when+dec);
  n.connect(hp).connect(g).connect(dest); n.start(when); n.stop(when+dec+0.03);
}
function timp(ctx,dest,midi,when,gain){
  const f=mtf(midi);
  const o=ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(f*1.5,when); o.frequency.exponentialRampToValueAtTime(f,when+0.08);
  const g=ctx.createGain();
  g.gain.setValueAtTime(gain,when); g.gain.exponentialRampToValueAtTime(0.0001,when+0.6);
  o.connect(g).connect(dest); o.start(when); o.stop(when+0.65);
}

/* =========================================================
   5. スタイル別アレンジ（ピアノ・ベース・ドラムのパターン）
   ========================================================= */
// スウィング（ジャズの跳ね）：オフ8分を後ろへ
function swing(tBeats, on){ return on ? tBeats : tBeats; }

function pianoEvents(ch, spb, style){
  const T=ch.tones, ev=[];
  if(style==='jpop'){                       // 8分の柔らかいアルペジオ
    for(let i=0;i<8;i++) ev.push({t:i*spb/2, notes:[T[i%T.length]], dur:spb*0.6, g:0.10});
  } else if(style==='jazz'){                 // シンコペした和音コンピング
    [{t:1,g:0.12},{t:2.66,g:0.11},{t:3.5,g:0.10}].forEach(s=> ev.push({t:s.t*spb, notes:T, dur:spb*0.45, g:s.g}));
  } else if(style==='classical'){            // アルベルティ・バス（低-高-中-高）
    const pat=[0,2,1,2];
    for(let i=0;i<8;i++) ev.push({t:i*spb/2, notes:[T[pat[i%4]%T.length]], dur:spb*0.5, g:0.09});
  } else if(style==='bossa'){                // ボサのシンコペ和音
    [0,1.5,2.5].forEach(x=> ev.push({t:x*spb, notes:T, dur:spb*0.6, g:0.09}));
  }
  return ev;
}
function bassEvents(ch, spb, style){
  const root=ch.root-12, fifth=root+7, third=ch.third-12, ev=[];
  if(style==='jpop'){
    ev.push({t:0,midi:root,dur:spb*1.4,g:0.32},{t:2*spb,midi:root,dur:spb*0.9,g:0.30},{t:3*spb,midi:fifth,dur:spb*0.9,g:0.28});
  } else if(style==='jazz'){                 // 4分のウォーキング風
    [root,third,fifth,fifth+2].forEach((m,i)=> ev.push({t:i*spb,midi:m,dur:spb*0.85,g:0.28}));
  } else if(style==='classical'){
    ev.push({t:0,midi:root,dur:spb*2.0,g:0.26},{t:2*spb,midi:fifth,dur:spb*2.0,g:0.24});
  } else if(style==='bossa'){                // 1と“2の裏”のボサ定番
    ev.push({t:0,midi:root,dur:spb*1.4,g:0.30},{t:1.5*spb,midi:fifth,dur:spb*0.8,g:0.26},
            {t:2*spb,midi:root,dur:spb*1.4,g:0.30},{t:3.5*spb,midi:fifth,dur:spb*0.6,g:0.24});
  }
  return ev;
}
function drumEvents(ch, spb, style){
  const ev=[];
  const K=(t,g)=>ev.push({d:'k',t:t*spb,g}), S=(t,g)=>ev.push({d:'s',t:t*spb,g}),
        H=(t,g,o)=>ev.push({d:'h',t:t*spb,g,o}), TP=(t,g)=>ev.push({d:'t',t:t*spb,g,midi:ch.root-24});
  if(style==='jpop'){
    K(0,0.55); K(2,0.55); K(2.5,0.4);
    S(1,0.32); S(3,0.34);
    for(let i=0;i<8;i++) H(i*0.5,0.09,false);
  } else if(style==='jazz'){                 // スウィングのライド＆軽いコンピング
    [0,0.66,1,1.66,2,2.66,3,3.66].forEach((t,i)=> H(t, i%2?0.06:0.09, i%2===1));
    S(1,0.10); S(3,0.11);
    K(0,0.22); K(2,0.22);
  } else if(style==='classical'){            // 太鼓は控えめ、ティンパニで拍だけ
    TP(0,0.30); TP(2,0.22);
  } else if(style==='bossa'){
    K(0,0.42); K(2,0.42);
    S(1,0.16); S(2.5,0.18); S(3.5,0.15);     // リム風のクラーベ寄り
    for(let i=0;i<8;i++) H(i*0.5,0.07,false);
  }
  return ev;
}

/* =========================================================
   6. 曲全体をスケジュール（再生・書き出し共通）
   ========================================================= */
function scheduleSong(ctx, out, when0){
  const b=state.brightness;
  const {chords, secPerBeat} = buildChords();

  const leadBus=ctx.createGain(); leadBus.gain.value=1.0; leadBus.connect(out);
  const harmBus=ctx.createGain(); harmBus.gain.value=0.85; harmBus.connect(out);
  const bassBus=ctx.createGain(); bassBus.gain.value=0.95; bassBus.connect(out);
  const drumBus=ctx.createGain(); drumBus.gain.value=0.9;  drumBus.connect(out);

  // 主役の旋律
  state.melody.forEach(n=> playLead(ctx, leadBus, n.midi, when0+n.start, Math.max(0.12,n.dur), b));

  // バンド（小節ごと）
  chords.forEach(ch=>{
    const t0 = when0 + ch.start;
    pianoEvents(ch, secPerBeat, state.style).forEach(e=>
      e.notes.forEach(m=> playPiano(ctx, harmBus, m, t0+e.t, e.dur, b, e.g)));
    bassEvents(ch, secPerBeat, state.style).forEach(e=>
      playBass(ctx, bassBus, e.midi, t0+e.t, e.dur, e.g));
    drumEvents(ch, secPerBeat, state.style).forEach(e=>{
      const t=t0+e.t;
      if(e.d==='k') kick(ctx,drumBus,t,e.g);
      else if(e.d==='s') snare(ctx,drumBus,t,e.g);
      else if(e.d==='h') hat(ctx,drumBus,t,e.g,e.o);
      else if(e.d==='t') timp(ctx,drumBus,e.midi,t,e.g);
    });
  });

  const totalSec = Math.max(
    chords.reduce((m,c)=>Math.max(m,c.start+c.dur),0),
    state.melody.reduce((m,n)=>Math.max(m,n.start+n.dur),0)
  ) + 0.9;
  return totalSec;
}

/* =========================================================
   7. 再生 / 停止（iOSのマナーモード対策込み）
   ========================================================= */
let sinkNode=null, sinkAudio=null, silentAudio=null;

function makeSilentWav(){
  const rate=8000, n=rate;
  const buf=new ArrayBuffer(44+n*2), v=new DataView(buf);
  const w=(o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4,36+n*2,true); w(8,'WAVEfmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true); w(36,'data'); v.setUint32(40,n*2,true);
  return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}
function ensureSilentLoop(){
  if(!silentAudio){ silentAudio=new Audio(makeSilentWav()); silentAudio.loop=true; silentAudio.setAttribute('playsinline',''); }
  silentAudio.play().catch(()=>{});
}
function ensureSink(){
  if(!sinkNode){
    sinkNode=audioCtx.createMediaStreamDestination();
    sinkAudio=new Audio(); sinkAudio.setAttribute('playsinline','');
    sinkAudio.srcObject=sinkNode.stream;
  }
}
function reviveAudio(){
  if(!playing) return;
  if(audioCtx && audioCtx.state!=='running') audioCtx.resume().catch(()=>{});
  if(silentAudio && silentAudio.paused) silentAudio.play().catch(()=>{});
  if(sinkAudio && sinkAudio.paused) sinkAudio.play().catch(()=>{});
}
document.addEventListener('touchend', reviveAudio, true);
window.addEventListener('focus', reviveAudio);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') reviveAudio(); });

$('playBtn').addEventListener('click', async ()=>{
  if(!state.melody.length) return;
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') await audioCtx.resume();
  stopPlayback();

  ensureSilentLoop(); ensureSink(); sinkAudio.play().catch(()=>{});
  if('mediaSession' in navigator){
    try{
      navigator.mediaSession.metadata = new MediaMetadata({title:'鼻歌スタジオ', artist:'あなたの鼻歌'});
      navigator.mediaSession.setActionHandler('pause', ()=>{ if(playing) stopPlayback(); });
    }catch(e){}
  }

  const master=audioCtx.createGain(); master.gain.value=0.8;
  const comp=audioCtx.createDynamicsCompressor();
  comp.threshold.value=-14; comp.ratio.value=4; comp.attack.value=0.004; comp.release.value=0.2;
  master.connect(comp); comp.connect(sinkNode);

  const when0=audioCtx.currentTime+0.12;
  const total=scheduleSong(audioCtx, master, when0);

  playing=true; $('playBtn').disabled=true; $('stopBtn').disabled=false;
  playHandles.push(master);
  startBeatDots(total);
  playHandles._end=setTimeout(()=>stopPlayback(), total*1000+200);
});
$('stopBtn').addEventListener('click', stopPlayback);

function stopPlayback(){
  if(playHandles._end) clearTimeout(playHandles._end);
  if(beatTimer){ clearInterval(beatTimer); beatTimer=null; }
  playHandles.forEach(n=>{ try{ n.disconnect(); }catch(e){} });
  playHandles=[]; playing=false;
  $('playBtn').disabled=false; $('stopBtn').disabled=true;
  document.querySelectorAll('.beat-dots span').forEach(s=>s.classList.remove('on'));
  setTimeout(()=>{ if(playing) return; if(silentAudio) silentAudio.pause(); if(sinkAudio) sinkAudio.pause(); }, 700);
}
function startBeatDots(total){
  const spb=60/state.tempo, dots=document.querySelectorAll('.beat-dots span'); let beat=0;
  const tick=()=>{ dots.forEach(s=>s.classList.remove('on')); dots[beat%4].classList.add('on'); beat++; };
  tick(); beatTimer=setInterval(tick, spb*1000);
}

/* =========================================================
   8. コントロール
   ========================================================= */
document.querySelectorAll('.style-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.style-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); state.style=btn.dataset.style;
    toast(btn.textContent.trim()+'に切り替えました');
  });
});
$('tempoSlider').addEventListener('input', e=>{
  state.tempo=+e.target.value; $('tempoVal').textContent=state.tempo+' BPM';
  processMelody(); // リズム補正はテンポに依存するので再計算
});
$('brightSlider').addEventListener('input', e=>{
  state.brightness=+e.target.value/100; const b=state.brightness;
  let label='ふつう';
  if(b<0.2) label='とても暗い'; else if(b<0.4) label='暗め';
  else if(b>0.8) label='とても明るい'; else if(b>0.6) label='明るめ';
  $('brightVal').textContent=label;
});
$('tuneBtn').addEventListener('click', ()=>{
  state.autoTune=!state.autoTune; $('tuneBtn').classList.toggle('on',state.autoTune);
  processMelody(); toast(state.autoTune?'音程を音階に合わせます':'歌ったままの音程で');
});
$('rhythmBtn').addEventListener('click', ()=>{
  state.autoRhythm=!state.autoRhythm; $('rhythmBtn').classList.toggle('on',state.autoRhythm);
  processMelody(); toast(state.autoRhythm?'拍に合わせて整えます':'歌ったままのリズムで');
});

/* =========================================================
   9. WAV書き出し
   ========================================================= */
$('saveBtn').addEventListener('click', async ()=>{
  if(!state.melody.length) return;
  toast('曲を書き出しています…');
  try{
    const sr=44100;
    const {chords}=buildChords();
    const dur=Math.max(
      chords.reduce((m,c)=>Math.max(m,c.start+c.dur),0),
      state.melody.reduce((m,n)=>Math.max(m,n.start+n.dur),0)
    )+1.0;
    const off=new OfflineAudioContext(2, Math.ceil(sr*dur), sr);
    const master=off.createGain(); master.gain.value=0.8;
    const comp=off.createDynamicsCompressor();
    comp.threshold.value=-14; comp.ratio.value=4; comp.attack.value=0.004; comp.release.value=0.2;
    master.connect(comp); comp.connect(off.destination);
    scheduleSong(off, master, 0.05);
    const rendered=await off.startRendering();
    const wav=encodeWAV(rendered);
    const blob=new Blob([wav],{type:'audio/wav'}); const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`hanauta_${state.style}_${NOTE_NAMES[state.key]}${state.isMinor?'m':''}_${state.tempo}bpm.wav`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
    toast('保存しました 🎵（ファイルアプリに入ります）');
  }catch(e){ toast('書き出しに失敗しました: '+e.message); }
});
function encodeWAV(audioBuffer){
  const numCh=audioBuffer.numberOfChannels, sr=audioBuffer.sampleRate, len=audioBuffer.length;
  const blockAlign=numCh*2, dataLen=len*blockAlign;
  const buffer=new ArrayBuffer(44+dataLen), view=new DataView(buffer);
  const wr=(off,str)=>{ for(let i=0;i<str.length;i++) view.setUint8(off+i,str.charCodeAt(i)); };
  wr(0,'RIFF'); view.setUint32(4,36+dataLen,true); wr(8,'WAVE');
  wr(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true);
  view.setUint16(22,numCh,true); view.setUint32(24,sr,true);
  view.setUint32(28,sr*blockAlign,true); view.setUint16(32,blockAlign,true);
  view.setUint16(34,16,true); wr(36,'data'); view.setUint32(40,dataLen,true);
  const chans=[]; for(let c=0;c<numCh;c++) chans.push(audioBuffer.getChannelData(c));
  let off=44;
  for(let i=0;i<len;i++) for(let c=0;c<numCh;c++){
    let s=Math.max(-1,Math.min(1,chans[c][i]));
    view.setInt16(off, s<0? s*0x8000 : s*0x7FFF, true); off+=2;
  }
  return view;
}

$('brightSlider').dispatchEvent(new Event('input'));
</script>
