<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="鼻歌スタジオ">
<meta name="theme-color" content="#12101c">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>鼻歌スタジオ</title>
<style>
  :root{
    --bg:#12101c; --bg2:#1b1830; --card:#221f38;
    --ink:#f3f0ff; --muted:#a79fd0; --line:#332e52;
    --accent:#c9a3ff; --accent2:#7ee0d3; --warm:#ffd6a0;
    --danger:#ff8a9c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:radial-gradient(120% 80% at 50% -10%, #241f45 0%, var(--bg) 55%);
    color:var(--ink); min-height:100vh; overscroll-behavior:none;
  }
  .wrap{max-width:520px; margin:0 auto;
    padding:calc(env(safe-area-inset-top,0px) + 22px) 18px calc(env(safe-area-inset-bottom,0px) + 60px);}
  header{text-align:center; margin:6px 0 20px}
  header h1{font-size:26px; margin:0; letter-spacing:.06em; font-weight:700}
  header p{color:var(--muted); font-size:13px; margin:6px 0 0}

  .card{
    background:linear-gradient(180deg, var(--card), #1e1b34);
    border:1px solid var(--line); border-radius:20px;
    padding:20px; margin:16px 0; box-shadow:0 10px 30px rgba(0,0,0,.25);
  }

  /* 録音ボタン */
  .rec-wrap{display:flex; flex-direction:column; align-items:center; gap:14px}
  .rec-btn{
    width:120px; height:120px; border-radius:50%; border:none;
    background:radial-gradient(circle at 50% 40%, #ff8fa3, #e0506f);
    color:#fff; font-size:16px; font-weight:700; letter-spacing:.05em;
    box-shadow:0 8px 26px rgba(224,80,111,.45); cursor:pointer;
    transition:transform .12s ease, box-shadow .2s ease; position:relative;
  }
  .rec-btn:active{transform:scale(.95)}
  .rec-btn.recording{
    background:radial-gradient(circle at 50% 40%, #9be7ff, #4fb8e0);
    box-shadow:0 0 0 0 rgba(79,184,224,.5); animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(79,184,224,.55)}
    70%{box-shadow:0 0 0 22px rgba(79,184,224,0)}
    100%{box-shadow:0 0 0 0 rgba(79,184,224,0)}
  }
  .hint{color:var(--muted); font-size:13px; text-align:center; line-height:1.7}
  .level{width:200px; height:6px; background:var(--line); border-radius:3px; overflow:hidden}
  .level > div{height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width .05s}
  .timer{font-variant-numeric:tabular-nums; font-size:15px; color:var(--muted)}

  /* 解析結果 */
  .analysis{display:none; grid-template-columns:1fr 1fr 1fr; gap:10px; text-align:center}
  .analysis.show{display:grid}
  .stat{background:#1a1730; border:1px solid var(--line); border-radius:14px; padding:12px 8px}
  .stat .k{font-size:11px; color:var(--muted); letter-spacing:.08em}
  .stat .v{font-size:20px; font-weight:700; margin-top:4px; color:var(--accent)}

  /* スタイル選択 */
  .section-title{font-size:13px; color:var(--muted); letter-spacing:.1em; margin:0 0 12px; font-weight:600}
  .styles{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .style-btn{
    padding:14px 10px; border-radius:14px; border:1px solid var(--line);
    background:#1a1730; color:var(--ink); font-size:15px; font-weight:600; cursor:pointer;
    display:flex; align-items:center; gap:10px; justify-content:center; transition:all .15s;
  }
  .style-btn .emoji{font-size:20px}
  .style-btn.active{border-color:var(--accent); background:linear-gradient(180deg,#332a5c,#282148); box-shadow:0 4px 16px rgba(201,163,255,.25)}

  /* スライダー */
  .slider-row{margin:18px 0}
  .slider-label{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); margin-bottom:8px}
  .slider-label b{color:var(--ink); font-weight:600}
  input[type=range]{
    -webkit-appearance:none; width:100%; height:8px; border-radius:5px;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:26px; height:26px; border-radius:50%;
    background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.4); cursor:pointer; border:3px solid var(--accent);
  }
  .bright-track input[type=range]{background:linear-gradient(90deg,#5b6bb0,#ffd76a)}

  /* 再生系 */
  .transport{display:flex; gap:12px; margin-top:6px}
  .btn{
    flex:1; padding:16px; border-radius:16px; border:none; font-size:16px; font-weight:700;
    cursor:pointer; transition:transform .1s, opacity .2s; letter-spacing:.04em;
  }
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.4}
  .btn-play{background:linear-gradient(135deg,#7ee0d3,#5ec4e0); color:#0d2a2f}
  .btn-stop{background:#2a2646; color:var(--ink); border:1px solid var(--line)}
  .btn-save{width:100%; margin-top:12px; background:linear-gradient(135deg,#c9a3ff,#9a7ae0); color:#180f2e}

  .disabled-area{opacity:.35; pointer-events:none; filter:grayscale(.4)}
  .toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(80px);
    background:#2a2646; color:var(--ink); padding:12px 22px; border-radius:30px;
    border:1px solid var(--line); font-size:14px; opacity:0; transition:all .3s; z-index:50; max-width:90%;
  }
  .toast.show{transform:translateX(-50%) translateY(0); opacity:1}
  footer{text-align:center; color:var(--muted); font-size:11px; margin-top:30px; opacity:.7; line-height:1.8}
  .beat-dots{display:flex; gap:6px; justify-content:center; margin-top:14px; height:10px}
  .beat-dots span{width:8px; height:8px; border-radius:50%; background:var(--line); transition:all .1s}
  .beat-dots span.on{background:var(--accent2); transform:scale(1.4)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎙 鼻歌スタジオ</h1>
    <p>ふんふん歌えば、伴奏がつく</p>
  </header>

  <!-- 録音 -->
  <div class="card">
    <div class="rec-wrap">
      <button id="recBtn" class="rec-btn">録音<br>START</button>
      <div class="level"><div id="levelBar"></div></div>
      <div class="timer" id="timer">00:00</div>
      <div class="hint" id="recHint">ボタンを押して、鼻歌を歌ってください<br>（5〜20秒くらいがおすすめ）</div>
    </div>
  </div>

  <!-- 解析結果 -->
  <div class="card" id="resultCard" style="display:none">
    <div class="analysis show" id="analysis">
      <div class="stat"><div class="k">キー</div><div class="v" id="statKey">—</div></div>
      <div class="stat"><div class="k">テンポ</div><div class="v" id="statTempo">—</div></div>
      <div class="stat"><div class="k">音の数</div><div class="v" id="statNotes">—</div></div>
    </div>
    <div class="beat-dots" id="beatDots"><span></span><span></span><span></span><span></span></div>
  </div>

  <!-- 調整パネル -->
  <div class="card" id="controlCard" style="display:none">
    <p class="section-title">曲調スタイル</p>
    <div class="styles" id="styles">
      <button class="style-btn active" data-style="jpop"><span class="emoji">🌸</span>J-POP</button>
      <button class="style-btn" data-style="jazz"><span class="emoji">🎷</span>ジャズ</button>
      <button class="style-btn" data-style="classical"><span class="emoji">🎻</span>クラシック</button>
      <button class="style-btn" data-style="bossa"><span class="emoji">🌴</span>ボサノバ</button>
    </div>

    <div class="slider-row" style="margin-top:22px">
      <div class="slider-label"><span>テンポ</span><b id="tempoVal">100 BPM</b></div>
      <input type="range" id="tempoSlider" min="60" max="180" value="100" step="1">
    </div>

    <div class="slider-row bright-track">
      <div class="slider-label"><span>🌙 暗い</span><b id="brightVal">ふつう</b><span>明るい ☀️</span></div>
      <input type="range" id="brightSlider" min="0" max="100" value="50" step="1">
    </div>

    <div class="transport">
      <button class="btn btn-play" id="playBtn">▶ 再生</button>
      <button class="btn btn-stop" id="stopBtn" disabled>■ 停止</button>
    </div>
    <button class="btn btn-save" id="saveBtn">⬇ WAVで保存</button>
  </div>

  <footer>
    マイクの音声はこの端末の中だけで処理され、どこにも送信されません。<br>
    Safariで「ホーム画面に追加」すればアプリのように使えます。
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   鼻歌スタジオ  —  Humming → Accompaniment Web App
   すべて端末内(Web Audio API)で処理。外部通信なし。
   ========================================================= */

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_NAMES_JP = ['ハ','嬰ハ','ニ','嬰ニ','ホ','ヘ','嬰ヘ','ト','嬰ト','イ','嬰イ','ロ'];

/* ---------- 状態 ---------- */
const state = {
  melody: [],        // {midi, start(sec), dur(sec)}
  key: 0,            // 0..11 (tonic pitch class)
  isMinor: false,
  tempo: 100,
  brightness: 0.5,   // 0..1
  style: 'jpop',
  baseTempo: 100,    // 解析で推定した元テンポ
};

let audioCtx = null;
let mediaStream = null;
let recNode = null;
let recording = false;
let recordedChunks = [];
let recStartTime = 0;
let timerInterval = null;
let playHandles = [];
let playing = false;
let beatTimer = null;

/* ---------- DOM ---------- */
const $ = id => document.getElementById(id);
const recBtn = $('recBtn'), levelBar = $('levelBar'), timerEl = $('timer'), recHint = $('recHint');
const resultCard = $('resultCard'), controlCard = $('controlCard');
const toastEl = $('toast');

function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastEl._t);
  toastEl._t = setTimeout(()=>toastEl.classList.remove('show'), 2600);
}

/* =========================================================
   1. 録音
   ========================================================= */
recBtn.addEventListener('click', async ()=>{
  if(!recording){ await startRecording(); }
  else { stopRecording(); }
});

async function startRecording(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
  }catch(e){
    toast('マイクを使えませんでした。設定で許可してください');
    return;
  }

  recordedChunks = [];
  const source = audioCtx.createMediaStreamSource(mediaStream);
  const bufSize = 4096;
  recNode = audioCtx.createScriptProcessor(bufSize, 1, 1);
  const sr = audioCtx.sampleRate;

  recNode.onaudioprocess = (e)=>{
    const input = e.inputBuffer.getChannelData(0);
    recordedChunks.push(new Float32Array(input));
    // レベルメーター
    let sum=0; for(let i=0;i<input.length;i++) sum += input[i]*input[i];
    const rms = Math.sqrt(sum/input.length);
    levelBar.style.width = Math.min(100, rms*400) + '%';
  };
  source.connect(recNode);
  // ScriptProcessorを動かすため無音出力へ接続
  const silent = audioCtx.createGain(); silent.gain.value = 0;
  recNode.connect(silent); silent.connect(audioCtx.destination);
  recNode._source = source;

  recording = true;
  recStartTime = performance.now();
  recBtn.classList.add('recording');
  recBtn.innerHTML = '録音中<br>STOP';
  recHint.textContent = 'もう一度押すと解析します';
  timerInterval = setInterval(updateTimer, 200);
}

function updateTimer(){
  const s = Math.floor((performance.now()-recStartTime)/1000);
  timerEl.textContent = String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  if(s >= 30) stopRecording(); // 上限30秒
}

function stopRecording(){
  if(!recording) return;
  recording = false;
  clearInterval(timerInterval);
  recBtn.classList.remove('recording');
  recBtn.innerHTML = '録音<br>START';
  levelBar.style.width = '0%';

  try{
    if(recNode._source) recNode._source.disconnect();
    recNode.disconnect();
  }catch(e){}
  if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop());

  // まとめて1本のFloat32Arrayへ
  let total = 0; recordedChunks.forEach(c=>total+=c.length);
  if(total < audioCtx.sampleRate*0.8){
    toast('短すぎました。もう少し歌ってみてください');
    return;
  }
  const buf = new Float32Array(total);
  let off=0; recordedChunks.forEach(c=>{buf.set(c,off); off+=c.length;});

  recHint.textContent = '解析しています…';
  setTimeout(()=>{ analyze(buf, audioCtx.sampleRate); }, 30);
}

/* =========================================================
   2. ピッチ解析（自己相関） → メロディ音符列
   ========================================================= */
function detectPitch(buf, sr){
  // RMSゲート
  let rms=0; for(let i=0;i<buf.length;i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms/buf.length);
  if(rms < 0.006) return -1;

  const MIN_F = 70, MAX_F = 1000;
  const maxLag = Math.floor(sr/MIN_F);
  const minLag = Math.floor(sr/MAX_F);
  let bestLag = -1, bestCorr = 0;
  let lastCorr = 1;
  // 正規化自己相関
  for(let lag=minLag; lag<=maxLag; lag++){
    let corr=0;
    for(let i=0;i<buf.length-lag;i++) corr += buf[i]*buf[i+lag];
    corr = corr / (buf.length-lag);
    if(corr > bestCorr){ bestCorr = corr; bestLag = lag; }
  }
  if(bestLag <= 0 || bestCorr < rms*rms*0.35) return -1;

  // 放物線補間で精度up
  let lag = bestLag;
  if(lag>minLag && lag<maxLag){
    const c0=acf(buf,lag-1), c1=acf(buf,lag), c2=acf(buf,lag+1);
    const denom = (c0 - 2*c1 + c2);
    if(denom!==0){ lag = lag + 0.5*(c0-c2)/denom; }
  }
  return sr/lag;
}
function acf(buf,lag){
  let corr=0; for(let i=0;i<buf.length-lag;i++) corr += buf[i]*buf[i+lag];
  return corr/(buf.length-lag);
}
function freqToMidi(f){ return Math.round(69 + 12*Math.log2(f/440)); }

function analyze(buf, sr){
  const frame = 2048, hop = 1024;
  const track = []; // {t, midi} midi=-1 は無音
  for(let start=0; start+frame<=buf.length; start+=hop){
    const seg = buf.subarray(start, start+frame);
    const f = detectPitch(seg, sr);
    const t = start/sr;
    track.push({ t, midi: f>0 ? freqToMidi(f) : -1, f });
  }

  // メディアンフィルタ（3点）で外れ値除去
  const med = track.map((p,i)=>{
    if(p.midi<0) return -1;
    const a=[track[i-1]?.midi ?? -1, p.midi, track[i+1]?.midi ?? -1].filter(x=>x>0).sort((x,y)=>x-y);
    return a.length? a[Math.floor(a.length/2)] : p.midi;
  });

  // 連続する同一MIDIをまとめて音符化
  const notes = [];
  let cur=null;
  for(let i=0;i<med.length;i++){
    const m = med[i], t = track[i].t;
    if(m>0){
      if(cur && Math.abs(cur.midi-m)<=0){ cur.end = t+hop/sr; }
      else { if(cur) notes.push(cur); cur = {midi:m, start:t, end:t+hop/sr}; }
    } else { if(cur){ notes.push(cur); cur=null; } }
  }
  if(cur) notes.push(cur);

  // 短すぎる音を除去、隣接同音を結合
  let clean = notes.filter(n=> (n.end-n.start) >= 0.09);
  // 近接する同一ピッチをつなぐ
  const merged=[];
  for(const n of clean){
    const last = merged[merged.length-1];
    if(last && last.midi===n.midi && (n.start-last.end)<0.12){ last.end=n.end; }
    else merged.push({...n});
  }
  clean = merged;

  if(clean.length < 3){
    recHint.textContent = 'ボタンを押して、鼻歌を歌ってください';
    toast('うまく聞き取れませんでした。もう一度、はっきりめに歌ってみてください');
    return;
  }

  // 相対時間へ正規化（最初の音を0に）
  const t0 = clean[0].start;
  const melody = clean.map(n=>({ midi:n.midi, start:n.start-t0, dur:n.end-n.start }));

  // テンポ推定：音符の長さ中央値を1拍とみなす
  const durs = melody.map(n=>n.dur).sort((a,b)=>a-b);
  const medDur = durs[Math.floor(durs.length/2)];
  let bpm = 60/medDur;
  while(bpm<70) bpm*=2;
  while(bpm>170) bpm/=2;
  bpm = Math.round(bpm);

  // キー推定（Krumhansl-Schmuckler 簡易版）
  const {tonic, minor} = detectKey(melody);

  state.melody = melody;
  state.key = tonic;
  state.isMinor = minor;
  state.baseTempo = bpm;
  state.tempo = bpm;

  // UI反映
  $('statKey').textContent = NOTE_NAMES[tonic] + (minor?'m':'');
  $('statTempo').textContent = bpm;
  $('statNotes').textContent = melody.length;
  $('tempoSlider').value = bpm;
  $('tempoVal').textContent = bpm + ' BPM';
  resultCard.style.display = 'block';
  controlCard.style.display = 'block';
  recHint.textContent = 'できました！スタイルを選んで▶再生してみてください';
  toast('解析完了！伴奏をつけました 🎶');
}

/* キー検出：ピッチクラスヒストグラム × 長短調プロファイル相関 */
function detectKey(melody){
  const hist = new Array(12).fill(0);
  melody.forEach(n=> hist[((n.midi%12)+12)%12] += n.dur);
  const major = [6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
  const minor = [6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
  let best={score:-1e9, tonic:0, minor:false};
  for(let t=0;t<12;t++){
    let sM=0,sm=0;
    for(let i=0;i<12;i++){
      sM += hist[i]*major[(i-t+12)%12];
      sm += hist[i]*minor[(i-t+12)%12];
    }
    if(sM>best.score) best={score:sM, tonic:t, minor:false};
    if(sm>best.score) best={score:sm, tonic:t, minor:true};
  }
  return {tonic:best.tonic, minor:best.minor};
}

/* =========================================================
   3. コード進行の生成（キー＋スタイル＋明るさ）
   ========================================================= */
// 度数(0-based)から音名midiへ。scaleは長調基準の半音配列。
const MAJOR_SCALE = [0,2,4,5,7,9,11];
const MINOR_SCALE = [0,2,3,5,7,8,10];

// スタイル別の進行テンプレ（度数 I=0 …）
const PROGRESSIONS = {
  jpop:      { major:[0,4,5,3], minor:[0,5,3,4] },      // I V vi IV
  jazz:      { major:[1,4,0,0], minor:[1,4,0,0] },      // ii V I I
  classical: { major:[0,3,4,0], minor:[0,3,4,0] },      // I IV V I
  bossa:     { major:[1,4,0,3], minor:[1,4,0,3] },      // ii V I IV
};

function buildChords(){
  const scale = state.isMinor ? MINOR_SCALE : MAJOR_SCALE;
  const prog = PROGRESSIONS[state.style][state.isMinor?'minor':'major'];
  const b = state.brightness; // 0 dark .. 1 bright

  // メロディの長さ→小節数
  const secPerBeat = 60/state.tempo;
  const barSec = secPerBeat*4;
  const melodyEnd = state.melody.reduce((m,n)=>Math.max(m,n.start+n.dur),0);
  const bars = Math.max(2, Math.ceil(melodyEnd/barSec)+1);

  const chords=[];
  for(let bar=0; bar<bars; bar++){
    const deg = prog[bar % prog.length];
    // 三和音（度数上に3度堆積）
    const rootMidiClass = (state.key + scale[deg%7]) % 12;
    const rootMidi = 48 + rootMidiClass; // C3付近
    const third = 48 + (state.key + scale[(deg+2)%7]) % 12 + (((deg+2)>=7)?12:0);
    const fifth = 48 + (state.key + scale[(deg+4)%7]) % 12 + (((deg+4)>=7)?12:0);
    let tones = [rootMidi, third, fifth];

    // 明るさ／スタイルで色付け（7th・9thなど）
    const isJazzy = (state.style==='jazz'||state.style==='bossa');
    if(isJazzy || b>0.66){
      const seventh = 48 + (state.key + scale[(deg+6)%7]) % 12 + (((deg+6)>=7)?12:0);
      tones.push(seventh+ (seventh<rootMidi?12:0));
    }
    if(b>0.8){ // とても明るい→9thを上に足す
      tones.push(rootMidi+14);
    }
    if(b<0.2){ // とても暗い→ルートを1オクターブ下に厚く
      tones.unshift(rootMidi-12);
    }
    chords.push({ bar, start:bar*barSec, dur:barSec, tones, root:rootMidi });
  }
  return {chords, bars, barSec, secPerBeat};
}

/* =========================================================
   4. シンセ音源（スタイル別音色）
   ========================================================= */
function playVoice(ctx, dest, midi, when, dur, opts={}){
  const freq = 440*Math.pow(2,(midi-69)/12);
  const {type='triangle', gain=0.2, attack=0.005, release=0.3, detune=0, filter=null, fmAmt=0} = opts;

  const osc = ctx.createOscillator();
  osc.type = type; osc.frequency.value = freq; osc.detune.value = detune;

  const g = ctx.createGain();
  const peak = gain;
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(peak, when+attack);
  g.gain.exponentialRampToValueAtTime(Math.max(0.0001,peak*0.4), when+Math.min(dur,attack+0.15));
  g.gain.setTargetAtTime(0.0001, when+Math.max(attack, dur*0.6), release);

  let node = osc;
  if(filter){
    const f = ctx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value = filter.freq; f.Q.value = filter.q||0.7;
    osc.connect(f); node = f;
  }
  // 軽いFM（エレピ風）
  if(fmAmt>0){
    const mod = ctx.createOscillator(); mod.frequency.value = freq*2;
    const modG = ctx.createGain(); modG.gain.value = freq*fmAmt;
    mod.connect(modG); modG.connect(osc.frequency);
    mod.start(when); mod.stop(when+dur+release);
  }
  node.connect(g); g.connect(dest);
  osc.start(when); osc.stop(when+dur+release+0.05);
}

// スタイルごとの音色プリセット（明るさbで可変）
function melodyVoice(b){
  return {
    jpop:      {type:'triangle', gain:0.26, attack:0.008, release:0.25, filter:{freq:1500+b*3500,q:0.6}},
    jazz:      {type:'sine',     gain:0.24, attack:0.01,  release:0.3,  fmAmt:0.15, filter:{freq:1200+b*3000,q:0.5}},
    classical: {type:'triangle', gain:0.24, attack:0.006, release:0.35, filter:{freq:2000+b*3000,q:0.5}},
    bossa:     {type:'sawtooth', gain:0.16, attack:0.006, release:0.25, filter:{freq:900+b*2600,q:1.0}},
  }[state.style];
}
function chordVoice(b){
  return {
    jpop:      {type:'sine',     gain:0.075, attack:0.02, release:0.5, filter:{freq:900+b*2500,q:0.5}},
    jazz:      {type:'sine',     gain:0.07,  attack:0.02, release:0.6, fmAmt:0.1, filter:{freq:800+b*2200,q:0.5}},
    classical: {type:'triangle', gain:0.06,  attack:0.01, release:0.6, filter:{freq:1100+b*2500,q:0.5}},
    bossa:     {type:'sawtooth', gain:0.05,  attack:0.008,release:0.4, filter:{freq:700+b*2000,q:1.2}},
  }[state.style];
}

/* 伴奏のリズムパターン（スタイル別）— 1小節を返す [{beatOffset, tones or 'root'}] */
function chordRhythm(barSec, secPerBeat, chord){
  const s = state.style;
  const events=[];
  const root = chord.root, tones = chord.tones;
  if(s==='jpop'){
    // 8分の柔らかいアルペジオ＋支え
    for(let i=0;i<8;i++){
      const t=i*secPerBeat/2;
      events.push({t, notes:[tones[i%tones.length]], voice:'chord', dur:secPerBeat/2*1.4});
    }
    events.push({t:0, notes:[root-12], voice:'bass', dur:barSec});
  } else if(s==='jazz'){
    // スウィング気味に和音を刻む＋ウォーキングっぽいベース
    [0,1,2,3].forEach(b=>{
      events.push({t:b*secPerBeat + (b%2? secPerBeat*0.12:0), notes:tones, voice:'chord', dur:secPerBeat*0.5});
    });
    [0,1,2,3].forEach(b=> events.push({t:b*secPerBeat, notes:[root-12 + (b%2?7:0)], voice:'bass', dur:secPerBeat*0.9}));
  } else if(s==='classical'){
    // アルベルティ・バス（下-上-中-上）
    const pat=[0,2,1,2];
    for(let i=0;i<8;i++){
      const t=i*secPerBeat/2;
      events.push({t, notes:[tones[pat[i%4] % tones.length]], voice:'chord', dur:secPerBeat/2});
    }
    events.push({t:0, notes:[root-12], voice:'bass', dur:barSec});
  } else if(s==='bossa'){
    // ボサの代表的なシンコペーション
    const hits=[0, 1.5, 2, 3.5];
    hits.forEach(hb=> events.push({t:hb*secPerBeat, notes:tones, voice:'chord', dur:secPerBeat*0.6}));
    events.push({t:0, notes:[root-12], voice:'bass', dur:secPerBeat*2});
    events.push({t:2*secPerBeat, notes:[root-12+7], voice:'bass', dur:secPerBeat*2});
  }
  return events;
}

/* =========================================================
   5. 曲全体をスケジュール（再生 & 書き出し共通）
   ========================================================= */
function scheduleSong(ctx, dest, when0){
  const b = state.brightness;
  const {chords, secPerBeat} = buildChords();
  const mVoice = melodyVoice(b);
  const cVoice = chordVoice(b);
  const bassVoice = {...cVoice, gain:cVoice.gain*2.2, type:(state.style==='bossa'||state.style==='jazz')?'sine':'triangle',
                     filter:{freq:400+b*600,q:0.6}, release:0.4};

  // メロディ（明るさで少しオクターブ上げ/音量）
  const octShift = b>0.85?12:0;
  state.melody.forEach(n=>{
    playVoice(ctx, dest, n.midi+octShift, when0+n.start, Math.max(0.12,n.dur), mVoice);
  });

  // 伴奏
  chords.forEach(ch=>{
    const evs = chordRhythm(ch.dur, secPerBeat, ch);
    evs.forEach(ev=>{
      const voice = ev.voice==='bass'? bassVoice : cVoice;
      ev.notes.forEach(m=> playVoice(ctx, dest, m, when0+ch.start+ev.t, ev.dur, voice));
    });
  });

  const totalSec = Math.max(
    chords.reduce((m,c)=>Math.max(m,c.start+c.dur),0),
    state.melody.reduce((m,n)=>Math.max(m,n.start+n.dur),0)
  ) + 0.8;
  return totalSec;
}

/* =========================================================
   6. 再生 / 停止
   ---------------------------------------------------------
   iOSはマナーモード中、通常のWeb Audioを消音してしまう。
   静けさアプリと同じく、音を <audio> 要素経由（メディア再生扱い）で
   出し、無音ループも併走させて消音スイッチの影響を受けないようにする。
   ========================================================= */
let sinkNode = null, sinkAudio = null, silentAudio = null;

function makeSilentWav(){
  const rate = 8000, n = rate; // 1秒の無音
  const buf = new ArrayBuffer(44 + n*2), v = new DataView(buf);
  const w = (o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + n*2, true); w(8,'WAVEfmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,'data'); v.setUint32(40, n*2, true);
  return URL.createObjectURL(new Blob([buf], {type:'audio/wav'}));
}
function ensureSilentLoop(){
  if(!silentAudio){
    silentAudio = new Audio(makeSilentWav());
    silentAudio.loop = true;
    silentAudio.setAttribute('playsinline','');
  }
  silentAudio.play().catch(()=>{});
}
function ensureSink(){
  if(!sinkNode){
    sinkNode = audioCtx.createMediaStreamDestination();
    sinkAudio = new Audio();
    sinkAudio.setAttribute('playsinline','');
    sinkAudio.srcObject = sinkNode.stream;
  }
}
// 割り込み・画面復帰で止まった音を生き返らせる
function reviveAudio(){
  if(!playing) return;
  if(audioCtx && audioCtx.state!=='running') audioCtx.resume().catch(()=>{});
  if(silentAudio && silentAudio.paused) silentAudio.play().catch(()=>{});
  if(sinkAudio && sinkAudio.paused) sinkAudio.play().catch(()=>{});
}
document.addEventListener('touchend', reviveAudio, true);
window.addEventListener('focus', reviveAudio);
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible') reviveAudio();
});

$('playBtn').addEventListener('click', async ()=>{
  if(!state.melody.length) return;
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') await audioCtx.resume();
  stopPlayback();

  ensureSilentLoop();
  ensureSink();
  sinkAudio.play().catch(()=>{});
  if('mediaSession' in navigator){
    try{
      navigator.mediaSession.metadata = new MediaMetadata({title:'鼻歌スタジオ', artist:'あなたの鼻歌'});
      navigator.mediaSession.setActionHandler('pause', ()=>{ if(playing) stopPlayback(); });
    }catch(e){}
  }

  const master = audioCtx.createGain(); master.gain.value = 0.9;
  const comp = audioCtx.createDynamicsCompressor();
  master.connect(comp); comp.connect(sinkNode);

  const when0 = audioCtx.currentTime + 0.1;
  const total = scheduleSong(audioCtx, master, when0);

  playing = true;
  $('playBtn').disabled = true;
  $('stopBtn').disabled = false;
  playHandles.push(master);

  // ビートインジケータ
  startBeatDots(total);
  playHandles._end = setTimeout(()=>{ stopPlayback(); }, total*1000+200);
});

$('stopBtn').addEventListener('click', stopPlayback);

function stopPlayback(){
  if(playHandles._end) clearTimeout(playHandles._end);
  if(beatTimer){ clearInterval(beatTimer); beatTimer=null; }
  playHandles.forEach(n=>{ try{ n.disconnect(); }catch(e){} });
  playHandles = [];
  playing = false;
  $('playBtn').disabled = false;
  $('stopBtn').disabled = true;
  document.querySelectorAll('.beat-dots span').forEach(s=>s.classList.remove('on'));
  // 再生経路を止める（余韻が消えてから）
  setTimeout(()=>{
    if(playing) return;
    if(silentAudio) silentAudio.pause();
    if(sinkAudio) sinkAudio.pause();
  }, 700);
}

function startBeatDots(total){
  const secPerBeat = 60/state.tempo;
  const dots = document.querySelectorAll('.beat-dots span');
  let beat=0;
  const tick=()=>{
    dots.forEach(s=>s.classList.remove('on'));
    dots[beat%4].classList.add('on');
    beat++;
  };
  tick();
  beatTimer = setInterval(tick, secPerBeat*1000);
}

/* =========================================================
   7. コントロール（スタイル・テンポ・明るさ）
   ========================================================= */
document.querySelectorAll('.style-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.style-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.style = btn.dataset.style;
    if(playing){ /* 次の再生から反映 */ }
    toast(btn.textContent.trim()+'に切り替えました');
  });
});

$('tempoSlider').addEventListener('input', e=>{
  state.tempo = +e.target.value;
  $('tempoVal').textContent = state.tempo + ' BPM';
});

$('brightSlider').addEventListener('input', e=>{
  state.brightness = +e.target.value/100;
  const b=state.brightness;
  let label = 'ふつう';
  if(b<0.2) label='とても暗い'; else if(b<0.4) label='暗め';
  else if(b>0.8) label='とても明るい'; else if(b>0.6) label='明るめ';
  $('brightVal').textContent = label;
});

/* =========================================================
   8. WAV書き出し（OfflineAudioContextでレンダリング）
   ========================================================= */
$('saveBtn').addEventListener('click', async ()=>{
  if(!state.melody.length) return;
  toast('曲を書き出しています…');
  try{
    const sr = 44100;
    // 長さを見積もるため一度計算
    const secPerBeat = 60/state.tempo;
    const {chords} = buildChords();
    const dur = Math.max(
      chords.reduce((m,c)=>Math.max(m,c.start+c.dur),0),
      state.melody.reduce((m,n)=>Math.max(m,n.start+n.dur),0)
    ) + 1.0;

    const offline = new OfflineAudioContext(2, Math.ceil(sr*dur), sr);
    const master = offline.createGain(); master.gain.value=0.9;
    const comp = offline.createDynamicsCompressor();
    master.connect(comp); comp.connect(offline.destination);
    scheduleSong(offline, master, 0.05);

    const rendered = await offline.startRendering();
    const wav = encodeWAV(rendered);
    const blob = new Blob([wav], {type:'audio/wav'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const name = `hanauta_${state.style}_${NOTE_NAMES[state.key]}${state.isMinor?'m':''}_${state.tempo}bpm.wav`;
    a.href=url; a.download=name; document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
    toast('保存しました 🎵（ファイルアプリに入ります）');
  }catch(e){
    toast('書き出しに失敗しました: '+e.message);
  }
});

function encodeWAV(audioBuffer){
  const numCh = audioBuffer.numberOfChannels;
  const sr = audioBuffer.sampleRate;
  const len = audioBuffer.length;
  const bytesPerSample = 2;
  const blockAlign = numCh*bytesPerSample;
  const dataLen = len*blockAlign;
  const buffer = new ArrayBuffer(44+dataLen);
  const view = new DataView(buffer);
  const wr=(off,str)=>{ for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); };
  wr(0,'RIFF'); view.setUint32(4,36+dataLen,true); wr(8,'WAVE');
  wr(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true);
  view.setUint16(22,numCh,true); view.setUint32(24,sr,true);
  view.setUint32(28,sr*blockAlign,true); view.setUint16(32,blockAlign,true);
  view.setUint16(34,16,true); wr(36,'data'); view.setUint32(40,dataLen,true);

  const chans=[]; for(let c=0;c<numCh;c++) chans.push(audioBuffer.getChannelData(c));
  let off=44;
  for(let i=0;i<len;i++){
    for(let c=0;c<numCh;c++){
      let s = Math.max(-1,Math.min(1,chans[c][i]));
      view.setInt16(off, s<0? s*0x8000 : s*0x7FFF, true);
      off+=2;
    }
  }
  return view;
}

$('brightSlider').dispatchEvent(new Event('input'));
